<?xml version="1.0" encoding="UTF-8"?>
<!-- CYD-GB 240x320 @ 0.5 scale - coords from firmware -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 640" font-family="system-ui, sans-serif" fill="#334155">
  <defs>
    <style>
      .frame { fill: #fff; stroke: #64748b; stroke-width: 1; }
      .ctrl { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 0.8; }
      .game { fill: #e2e8f0; stroke: #64748b; stroke-width: 0.8; }
      .cap { fill: #64748b; font-size: 8px; text-anchor: middle; }
      .t { font-size: 11px; }
      .ts { font-size: 9px; }
      .touch { fill: none; stroke: #94a3b8; stroke-width: 0.6; stroke-dasharray: 3 2; opacity: 0.7; }
      .rowlbl { fill: #64748b; font-size: 8px; }
      .accent { fill: #64748b; }
      .hi { fill: #334155; }
      .mute { fill: #94a3b8; }
      .danger { fill: #b91c1c; }
      .ok { fill: #15803d; }
      .prog { fill: #cbd5e1; }
      .cover { stroke: #94a3b8; stroke-width: 0.6; }
      .coversel { stroke: #64748b; stroke-width: 2; }
    </style>
  </defs>

  <!-- 1 Splash boot brand + progress -->
  <g transform="translate(10,16) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="80" y="88" width="80" height="80" rx="8"/>
    <text x="120" y="128" class="t" text-anchor="middle">GB</text>
    <text x="120" y="188" class="t" text-anchor="middle">CYD-GB</text>
    <text x="120" y="208" class="ts" text-anchor="middle">Game Boy</text>
    <rect class="prog" x="20" y="288" width="200" height="6"/>
    <rect class="progf" x="20" y="288" width="120" height="6"/>
    <text x="120" y="304" class="rowlbl" text-anchor="middle">boot...</text>
  </g>
  <text x="70" y="188" class="cap">Splash</text>

  <!-- 2 SD error card + hint -->
  <g transform="translate(150,16) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="40" y="72" width="160" height="100"/>
    <rect x="100" y="92" width="40" height="52" fill="none" stroke="#64748b"/>
    <line x1="108" y1="100" x2="132" y2="124" stroke="#b91c1c"/>
    <line x1="132" y1="100" x2="108" y2="124" stroke="#b91c1c"/>
    <text x="120" y="198" class="t" text-anchor="middle">SD card error!</text>
    <text x="120" y="222" class="ts" text-anchor="middle">Insert FAT32 SD</text>
    <text x="120" y="242" class="rowlbl" text-anchor="middle">reset device</text>
  </g>
  <text x="210" y="188" class="cap">SD error</text>

  <!-- 3 Loading spinner + progress -->
  <g transform="translate(290,16) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <text x="120" y="96" class="t" text-anchor="middle">Loading...</text>
    <text x="120" y="128" class="ts" text-anchor="middle">game_title</text>
    <circle class="touch" cx="120" cy="188" r="28"/>
    <circle cx="120" cy="160" r="4" fill="#64748b"/>
    <circle cx="140" cy="172" r="4" fill="#94a3b8"/>
    <circle cx="140" cy="204" r="4" fill="#cbd5e1"/>
    <circle cx="120" cy="216" r="4" fill="#cbd5e1"/>
    <circle cx="100" cy="204" r="4" fill="#cbd5e1"/>
    <circle cx="100" cy="172" r="4" fill="#94a3b8"/>
    <rect class="prog" x="20" y="248" width="200" height="8"/>
    <rect class="progf" x="20" y="248" width="130" height="8"/>
    <text x="120" y="272" class="rowlbl" text-anchor="middle">reading ROM...</text>
  </g>
  <text x="350" y="188" class="cap">Loading</text>

  <!-- 4 No ROMs empty state -->
  <g transform="translate(430,16) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="0" y="0" width="240" height="36"/>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#64748b"/>
    <rect class="ctrl" x="88" y="100" width="64" height="48"/>
    <line x1="96" y1="108" x2="144" y2="108" stroke="#94a3b8"/>
    <line x1="96" y1="118" x2="144" y2="118" stroke="#94a3b8"/>
    <line x1="96" y1="128" x2="128" y2="128" stroke="#94a3b8"/>
    <text x="120" y="178" class="t" text-anchor="middle">No ROMs found!</text>
    <text x="120" y="202" class="ts" text-anchor="middle">/roms/gb/*.gb</text>
  </g>
  <text x="490" y="188" class="cap">No ROMs</text>

  <!-- 5 Launcher grid 2x3 cover art + footer -->
  <g transform="translate(10,200) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="0" y="0" width="240" height="36"/>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#64748b"/>
    <text x="12" y="13" class="ts">Games</text>
    <text x="12" y="28" class="ts">12 ROMs</text>
    <circle class="ctrl" cx="216" cy="18" r="16"/>
    <rect class="touch" x="192" y="0" width="48" height="36"/>

    <!-- grid 2 cols x 3 rows | cell 113x74 gap 6 pad 4 -->
    <!-- row0 col0 selected -->
    <rect class="ctrl coversel" x="4" y="40" width="113" height="74"/>
    <rect class="cover" x="6" y="42" width="109" height="52" fill="#cbd5e1"/>
    <rect x="10" y="46" width="101" height="44" fill="#94a3b8" opacity="0.35"/>
    <text x="60" y="72" class="ts" text-anchor="middle">TETRIS</text>
    <text x="60" y="106" class="rowlbl" text-anchor="middle">tetris.gb</text>

    <!-- row0 col1 -->
    <rect class="ctrl" x="123" y="40" width="113" height="74"/>
    <rect class="cover" x="125" y="42" width="109" height="52" fill="#e2e8f0"/>
    <rect x="129" y="46" width="101" height="44" fill="#64748b" opacity="0.25"/>
    <text x="181" y="72" class="ts" text-anchor="middle">ZELDA</text>
    <text x="181" y="106" class="rowlbl" text-anchor="middle">zelda.gb</text>

    <!-- row1 col0 -->
    <rect class="ctrl" x="4" y="120" width="113" height="74"/>
    <rect class="cover" x="6" y="122" width="109" height="52" fill="#dcfce7"/>
    <text x="60" y="152" class="ts" text-anchor="middle">POKEMON</text>
    <text x="60" y="186" class="rowlbl" text-anchor="middle">pokemon.gbc</text>

    <!-- row1 col1 -->
    <rect class="ctrl" x="123" y="120" width="113" height="74"/>
    <rect class="cover" x="125" y="122" width="109" height="52" fill="#fef3c7"/>
    <text x="181" y="152" class="ts" text-anchor="middle">MARIO</text>
    <text x="181" y="186" class="rowlbl" text-anchor="middle">mario.gb</text>

    <!-- row2 col0 -->
    <rect class="ctrl" x="4" y="200" width="113" height="74"/>
    <rect class="cover" x="6" y="202" width="109" height="52" fill="#dbeafe"/>
    <text x="60" y="232" class="ts" text-anchor="middle">METROID</text>
    <text x="60" y="266" class="rowlbl" text-anchor="middle">metroid.gb</text>

    <!-- row2 col1 -->
    <rect class="ctrl" x="123" y="200" width="113" height="74"/>
    <rect class="cover" x="125" y="202" width="109" height="52" fill="#fce7f3"/>
    <text x="181" y="232" class="ts" text-anchor="middle">KIRBY</text>
    <text x="181" y="266" class="rowlbl" text-anchor="middle">kirby.gb</text>

    <rect class="ctrl" x="0" y="278" width="240" height="42"/>
    <rect class="touch" x="0" y="278" width="120" height="42"/>
    <rect class="touch" x="120" y="278" width="120" height="42"/>
    <text x="60" y="303" class="ts" text-anchor="middle">&lt; Prev</text>
    <text x="120" y="303" class="rowlbl" text-anchor="middle">1/2</text>
    <text x="180" y="303" class="ts" text-anchor="middle">Next &gt;</text>
  </g>
  <text x="70" y="372" class="cap">Launcher grid</text>

  <!-- 6 In-game hw_config.h display.cpp -->
  <g transform="translate(150,200) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="0" y="0" width="240" height="24"/>
    <circle cx="10" cy="12" r="3" fill="#94a3b8"/>
    <text x="20" y="12" class="ts">title</text>
    <text x="160" y="12" class="ts" text-anchor="middle">42 fps</text>
    <rect class="ctrl" x="204" y="0" width="36" height="24"/>
    <rect x="216" y="6" width="3" height="12" fill="#64748b"/>
    <rect x="225" y="6" width="3" height="12" fill="#64748b"/>
    <rect class="game" x="0" y="25" width="240" height="216" fill="none" stroke="#cbd5e1" stroke-width="0.5"/>
    <rect class="game" x="1" y="26" width="238" height="214"/>
    <rect class="ctrl" x="0" y="242" width="240" height="78"/>
    <circle class="ctrl" cx="52" cy="281" r="34"/>
    <circle fill="#94a3b8" cx="52" cy="281" r="10"/>
    <circle class="ctrl" cx="120" cy="267" r="12"/>
    <rect x="112" y="264" width="16" height="2" fill="#64748b"/>
    <rect x="112" y="268" width="16" height="2" fill="#64748b"/>
    <circle class="ctrl" cx="120" cy="295" r="12"/>
    <polygon points="114,288 114,302 128,295" fill="#64748b"/>
    <rect class="ctrl" x="155" y="242" width="40" height="78"/>
    <text x="175" y="281" class="t" text-anchor="middle">B</text>
    <rect class="ctrl" x="197" y="242" width="43" height="78"/>
    <text x="218" y="281" class="t" text-anchor="middle">A</text>
  </g>
  <text x="210" y="372" class="cap">In-game</text>

  <!-- 7 Pause full bleed rows 48px -->
  <g transform="translate(290,200) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="0" y="0" width="240" height="32"/>
    <line x1="0" y1="31" x2="240" y2="31" stroke="#64748b"/>
    <text x="120" y="16" class="t" text-anchor="middle">Paused</text>
    <rect class="ctrl" x="0" y="32" width="240" height="48"/>
    <text x="120" y="58" class="ts" text-anchor="middle">Resume</text>
    <rect class="ctrl" x="0" y="80" width="240" height="48"/>
    <text x="120" y="106" class="ts" text-anchor="middle">Save</text>
    <rect class="ctrl" x="0" y="128" width="240" height="48"/>
    <text x="120" y="154" class="ts" text-anchor="middle">Load</text>
    <rect class="ctrl" x="0" y="176" width="240" height="48"/>
    <text x="120" y="202" class="ts" text-anchor="middle">Settings</text>
    <rect class="ctrl" x="0" y="224" width="240" height="48"/>
    <text x="120" y="250" class="ts" text-anchor="middle">Calibrate</text>
    <rect class="ctrl" x="0" y="272" width="240" height="48"/>
    <text x="120" y="298" class="ts" text-anchor="middle">Quit</text>
  </g>
  <text x="350" y="372" class="cap">Pause</text>

  <!-- 8 Settings touch 2.8in - theme rows full bleed min 48px tap -->
  <g transform="translate(430,200) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <!-- HDR 32 -->
    <rect class="ctrl" x="0" y="0" width="240" height="32"/>
    <line x1="0" y1="31" x2="240" y2="31" stroke="#64748b"/>
    <text x="120" y="16" class="t" text-anchor="middle">Settings</text>

    <!-- row0 palette y=32 h=58 | tap L/R 72px -->
    <rect class="ctrl" x="0" y="32" width="240" height="58"/>
    <rect class="touch" x="0" y="32" width="72" height="58"/>
    <rect class="touch" x="168" y="32" width="72" height="58"/>
    <text x="36" y="58" class="t" text-anchor="middle">&lt;</text>
    <text x="204" y="58" class="t" text-anchor="middle">&gt;</text>
    <text x="12" y="44" class="rowlbl">Palette</text>
    <text x="120" y="56" class="ts" text-anchor="middle">#1 Classic Green</text>
    <rect fill="#9bbc0f" x="44" y="72" width="32" height="6" rx="1"/>
    <rect fill="#306230" x="82" y="72" width="32" height="6" rx="1"/>
    <rect fill="#0f380f" x="120" y="72" width="32" height="6" rx="1"/>
    <rect fill="#051405" x="158" y="72" width="32" height="6" rx="1"/>

    <!-- row1 frame skip y=90 h=48 -->
    <rect class="ctrl" x="0" y="90" width="240" height="48"/>
    <rect class="touch" x="0" y="90" width="72" height="48"/>
    <rect class="touch" x="168" y="90" width="72" height="48"/>
    <text x="36" y="116" class="t" text-anchor="middle">&lt;</text>
    <text x="204" y="116" class="t" text-anchor="middle">&gt;</text>
    <text x="12" y="104" class="rowlbl">Frame skip</text>
    <text x="120" y="118" class="ts" text-anchor="middle">0 (~60fps)</text>

    <!-- row2 brightness y=138 h=48 -->
    <rect class="ctrl" x="0" y="138" width="240" height="48"/>
    <rect class="touch" x="0" y="138" width="72" height="48"/>
    <rect class="touch" x="168" y="138" width="72" height="48"/>
    <text x="36" y="164" class="t" text-anchor="middle">&lt;</text>
    <text x="204" y="164" class="t" text-anchor="middle">&gt;</text>
    <text x="12" y="152" class="rowlbl">Brightness</text>
    <text x="120" y="166" class="ts" text-anchor="middle">100%</text>

    <!-- row3 language y=186 h=48 -->
    <rect class="ctrl" x="0" y="186" width="240" height="48"/>
    <rect class="touch" x="0" y="186" width="72" height="48"/>
    <rect class="touch" x="168" y="186" width="72" height="48"/>
    <text x="36" y="212" class="t" text-anchor="middle">&lt;</text>
    <text x="204" y="212" class="t" text-anchor="middle">&gt;</text>
    <text x="12" y="200" class="rowlbl">Language</text>
    <text x="120" y="214" class="ts" text-anchor="middle">English</text>

    <!-- save y=270 h=50 full bleed -->
    <rect class="ctrl" x="0" y="270" width="240" height="50"/>
    <text x="120" y="297" class="t" text-anchor="middle">Save and back</text>
  </g>
  <text x="490" y="372" class="cap">Settings</text>

  <!-- 9 Calibration touch 2.8in targets + progress -->
  <g transform="translate(10,384) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <!-- header -->
    <rect class="ctrl" x="0" y="0" width="240" height="32"/>
    <line x1="0" y1="31" x2="240" y2="31" stroke="#64748b"/>
    <text x="120" y="16" class="t" text-anchor="middle">Calibration</text>

    <!-- step progress 1..5 -->
    <circle cx="36" cy="48" r="6" fill="#64748b"/>
    <circle cx="72" cy="48" r="6" fill="#64748b"/>
    <circle cx="108" cy="48" r="8" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="144" cy="48" r="6" fill="none" stroke="#cbd5e1"/>
    <circle cx="180" cy="48" r="6" fill="none" stroke="#cbd5e1"/>
    <line x1="42" y1="48" x2="66" y2="48" stroke="#64748b"/>
    <line x1="78" y1="48" x2="100" y2="48" stroke="#64748b"/>
    <line x1="116" y1="48" x2="138" y2="48" stroke="#cbd5e1"/>
    <line x1="150" y1="48" x2="174" y2="48" stroke="#cbd5e1"/>

    <!-- instruction band -->
    <rect class="ctrl" x="0" y="64" width="240" height="32"/>
    <text x="120" y="76" class="rowlbl" text-anchor="middle">Step 3 of 5</text>
    <text x="120" y="90" class="ts" text-anchor="middle">Touch Bottom-Left +</text>

    <!-- TL done (22,50) -->
    <circle class="touch" cx="22" cy="50" r="28"/>
    <circle cx="22" cy="50" r="12" fill="#15803d"/>
    <line x1="8" y1="50" x2="36" y2="50" stroke="#15803d"/>
    <line x1="22" y1="36" x2="22" y2="64" stroke="#15803d"/>

    <!-- TR done (218,50) -->
    <circle class="touch" cx="218" cy="50" r="28"/>
    <circle cx="218" cy="50" r="12" fill="#15803d"/>
    <line x1="204" y1="50" x2="232" y2="50" stroke="#15803d"/>
    <line x1="218" y1="36" x2="218" y2="64" stroke="#15803d"/>

    <!-- BL active (22,270) -->
    <circle class="touch" cx="22" cy="270" r="28"/>
    <circle cx="22" cy="270" r="14" fill="none" stroke="#64748b" stroke-width="2"/>
    <line x1="4" y1="270" x2="40" y2="270" stroke="#64748b" stroke-width="2"/>
    <line x1="22" y1="252" x2="22" y2="288" stroke="#64748b" stroke-width="2"/>
    <circle cx="22" cy="270" r="4" fill="#64748b"/>

    <!-- BR pending (218,270) -->
    <circle class="touch" cx="218" cy="270" r="28"/>
    <circle cx="218" cy="270" r="12" fill="none" stroke="#cbd5e1"/>
    <line x1="204" y1="270" x2="232" y2="270" stroke="#cbd5e1"/>
    <line x1="218" y1="256" x2="218" y2="284" stroke="#cbd5e1"/>

    <!-- center pending (120,160) -->
    <circle class="touch" cx="120" cy="160" r="28"/>
    <circle cx="120" cy="160" r="12" fill="none" stroke="#cbd5e1"/>
    <line x1="106" y1="160" x2="134" y2="160" stroke="#cbd5e1"/>
    <line x1="120" y1="146" x2="120" y2="174" stroke="#cbd5e1"/>

    <!-- footer hint -->
    <text x="120" y="312" class="rowlbl" text-anchor="middle">hold 3s between points</text>
  </g>
  <text x="70" y="556" class="cap">Calibration</text>

  <!-- 10 Cal OK success card -->
  <g transform="translate(150,384) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="30" y="110" width="180" height="100"/>
    <circle cx="120" cy="145" r="18" fill="none" stroke="#15803d" stroke-width="2"/>
    <polyline points="110,145 118,153 132,137" fill="none" stroke="#15803d" stroke-width="2"/>
    <text x="120" y="182" class="ts" text-anchor="middle">Calibration saved!</text>
    <text x="120" y="230" class="rowlbl" text-anchor="middle">auto close 1.2s</text>
  </g>
  <text x="210" y="556" class="cap">Cal OK</text>

  <!-- 11 Cal fail error card -->
  <g transform="translate(290,384) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="ctrl" x="30" y="100" width="180" height="110"/>
    <circle cx="120" cy="132" r="18" fill="none" stroke="#b91c1c" stroke-width="2"/>
    <line x1="110" y1="122" x2="130" y2="142" stroke="#b91c1c" stroke-width="2"/>
    <line x1="130" y1="122" x2="110" y2="142" stroke="#b91c1c" stroke-width="2"/>
    <text x="120" y="168" class="ts" text-anchor="middle">Calibration failed!</text>
    <text x="120" y="188" class="rowlbl" text-anchor="middle">Using factory map</text>
    <text x="120" y="230" class="rowlbl" text-anchor="middle">auto close 2s</text>
  </g>
  <text x="350" y="556" class="cap">Cal fail</text>

  <!-- 12 Toast banner over game -->
  <g transform="translate(430,384) scale(0.5)">
    <rect class="frame" width="240" height="320"/>
    <rect class="game" x="1" y="26" width="238" height="214" opacity="0.5"/>
    <rect class="ctrl" x="20" y="118" width="200" height="44"/>
    <text x="120" y="142" class="t" text-anchor="middle">SAVED!</text>
    <text x="120" y="156" class="rowlbl" text-anchor="middle">700ms</text>
  </g>
  <text x="490" y="556" class="cap">Toast</text>
</svg>

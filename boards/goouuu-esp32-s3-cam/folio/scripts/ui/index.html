<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Folio</title>
<link rel="stylesheet" href="/ui/app.css"/>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand">Folio</div>
    <div class="day-nav">
      <button type="button" id="day-prev" aria-label="Dia anterior">‹</button>
      <input type="date" id="day-input"/>
      <button type="button" id="day-next" aria-label="Próximo dia">›</button>
    </div>
    <div class="status" id="status-chips"></div>
    <button type="button" class="icon-btn" id="btn-drawer" title="Sistema e config">⚙</button>
  </header>

  <div class="layout">
    <section class="insights-pane">
      <div class="pane-head">
        <h1>Hoje</h1>
        <p class="muted" id="insights-meta"></p>
      </div>
      <div id="insights-alert" class="digest-alert" hidden></div>
      <div id="insights-summary" class="day-summary muted">Observando o ambiente…</div>
      <div id="insights-moments" class="moment-list"></div>
      <div id="insights-entities" class="entity-cards"></div>
      <details class="insights-more" id="insights-more">
        <summary>Mais detalhes</summary>
        <ul id="insights-list" class="insight-list"></ul>
        <ul id="patterns-list" class="insight-list muted"></ul>
      </details>
    </section>

    <aside class="archive-pane">
      <div class="witness-head">
        <h2>Momentos</h2>
        <div class="filters">
          <button type="button" class="filter on" data-f="all">Tudo</button>
          <button type="button" class="filter" data-f="speech">Falas</button>
          <button type="button" class="filter" data-f="frames">Cenas</button>
        </div>
      </div>
      <p class="witness-stats" id="witness-stats"></p>
      <div class="witness-feed" id="witness-feed"></div>
    </aside>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div class="drawer-tabs">
      <button type="button" class="drawer-tab on" data-panel="system">Sistema</button>
      <button type="button" class="drawer-tab" data-panel="config">Config</button>
    </div>
    <button type="button" class="icon-btn" id="drawer-close">×</button>
  </div>
  <div class="drawer-body">
    <div id="panel-system">
      <div class="panel-block">
        <h3>Status</h3>
        <div class="grid2" id="health-grid"></div>
        <div class="row" style="margin-top:12px">
          <button type="button" id="btn-process">Processar fila</button>
          <button type="button" id="btn-reindex">Reindexar memória</button>
        </div>
        <p class="muted" id="action-msg"></p>
      </div>
      <div class="panel-block">
        <h3>Memória RAG</h3>
        <p class="muted" id="mem-stats"></p>
        <div class="row">
          <input type="search" id="mem-q" placeholder="Buscar no arquivo…" style="flex:1;border:1px solid var(--line);background:var(--bg);padding:8px"/>
          <button type="button" id="mem-search">Buscar</button>
        </div>
        <div id="mem-hits" style="margin-top:12px"></div>
      </div>
      <div class="panel-block">
        <h3>Dispositivos ESP</h3>
        <div class="devices" id="devices"></div>
      </div>
    </div>
    <div id="panel-config" hidden>
      <p class="muted" id="cfg-info"></p>
      <p class="muted" id="cfg-runtime"></p>
      <div class="row">
        <button type="button" id="cfg-lm-refresh">Atualizar modelos</button>
        <span class="muted" id="cfg-lm-status"></span>
      </div>
      <form id="cfg-form"></form>
      <div class="row" style="margin-top:16px">
        <button type="submit" form="cfg-form" class="primary">Salvar</button>
        <button type="button" id="cfg-reload">Recarregar</button>
      </div>
      <p class="muted" id="cfg-save-msg"></p>
    </div>
  </div>
</aside>

<div id="toast"></div>
<div class="lightbox" id="lightbox"><button type="button" id="lb-close">×</button><img id="lb-img" alt=""/></div>
<script src="/ui/app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Folio</title>
<style>
:root{
  --bg:#0f1115;--bg2:#161a21;--bg3:#1c222c;--line:#2a3140;
  --text:#e8eaed;--muted:#9aa3b2;--dim:#6b7280;
  --accent:#7cacf8;--accent-dim:#4a7fd4;
  --frame:#7cacf8;--audio:#6ee7b7;--warn:#fbbf24;
  --radius:12px;--shadow:0 8px 32px rgba(0,0,0,.4);
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --serif:"Iowan Old Style",Georgia,"Palatino Linotype",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5}
a{color:var(--accent);text-decoration:none}
button,input{font:inherit}
.app-header{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  padding:14px 24px;border-bottom:1px solid var(--line);
  background:rgba(15,17,21,.9);backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:var(--serif);font-size:1.35rem;font-weight:500;letter-spacing:.02em}
.brand span{font-size:.8rem;color:var(--dim)}
.day-nav{display:flex;align-items:center;gap:6px}
.day-nav button{
  width:34px;height:34px;border:1px solid var(--line);border-radius:8px;
  background:var(--bg2);color:var(--muted);cursor:pointer;
}
.day-nav button:hover{border-color:var(--accent-dim);color:var(--text)}
.day-nav input{
  border:1px solid var(--line);border-radius:8px;background:var(--bg2);
  color:var(--text);padding:7px 10px;width:148px;
}
.status{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.pill{
  font-size:.72rem;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);background:var(--bg2);color:var(--muted);
}
.pill.warn{border-color:#5c4818;color:#fcd34d}
.pill.ok{border-color:#1a4d3a;color:var(--audio)}
.layout{
  display:grid;grid-template-columns:minmax(280px,380px) 1fr;
  gap:0;max-width:1400px;margin:0 auto;min-height:calc(100vh - 64px);
}
.chronicle{
  border-right:1px solid var(--line);padding:28px 24px 40px;
  position:sticky;top:64px;height:calc(100vh - 64px);overflow:auto;
}
.chronicle-label{
  font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--dim);margin-bottom:12px;
}
.chronicle-meta{font-size:.78rem;color:var(--muted);margin-bottom:20px}
.chronicle-body{
  font-family:var(--serif);font-size:1.08rem;line-height:1.75;
  white-space:pre-wrap;color:var(--text);
}
.chronicle-empty{color:var(--muted);font-family:var(--serif);font-style:italic}
.feed{padding:24px 24px 48px;min-width:0}
.feed-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;margin-bottom:20px;
}
.feed-toolbar h2{font-size:.95rem;font-weight:600}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter{
  border:1px solid var(--line);background:var(--bg2);color:var(--muted);
  padding:6px 12px;border-radius:999px;font-size:.78rem;cursor:pointer;
}
.filter.active{border-color:var(--accent);color:var(--accent);background:#1a2332}
.feed-stats{font-size:.75rem;color:var(--dim)}
.timeline{display:flex;flex-direction:column;gap:16px}
.entry{
  display:grid;grid-template-columns:56px 1fr;gap:14px;
  padding-bottom:16px;border-bottom:1px solid var(--line);
}
.entry:last-child{border-bottom:none}
.entry-time{
  font-size:.72rem;color:var(--dim);padding-top:4px;text-align:right;
  font-variant-numeric:tabular-nums;
}
.entry-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
}
.entry-head{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--line);font-size:.75rem;
}
.badge{padding:3px 8px;border-radius:6px;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em}
.badge.frame{background:#1a2438;color:#9ec5fe}
.badge.audio{background:#142820;color:#86efac}
.badge.pending{background:#1e2433;color:#fbbf24}
.entry-reason{margin-left:auto;color:var(--dim)}
.entry-body{padding:14px}
.frame-img{
  display:block;width:100%;max-height:420px;object-fit:contain;
  background:#080a0e;cursor:zoom-in;
}
.caption{margin-top:12px;font-size:.92rem;line-height:1.55;color:var(--muted)}
.caption.pending{color:var(--muted);font-style:italic}
.transcript{
  margin-top:10px;padding:12px 14px;border-left:3px solid var(--accent-dim);
  font-family:var(--serif);font-size:.95rem;color:var(--text);
}
.transcript.pending{color:var(--muted);font-style:italic;border-color:var(--line)}
audio{width:100%;height:40px;border-radius:8px}
.empty{
  text-align:center;padding:48px 24px;color:var(--muted);
  border:1px dashed var(--line);border-radius:var(--radius);
}
.load-more{
  display:block;width:100%;margin-top:8px;padding:12px;
  border:1px solid var(--line);border-radius:10px;background:var(--bg2);
  color:var(--muted);cursor:pointer;
}
.load-more:hover{border-color:var(--accent-dim);color:var(--text)}
.lightbox{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;padding:24px;
}
.lightbox.open{display:flex}
.lightbox img{max-width:min(96vw,1100px);max-height:92vh;border-radius:8px}
.lightbox button{
  position:absolute;top:20px;right:20px;width:40px;height:40px;
  border:none;border-radius:50%;background:rgba(255,255,255,.12);
  color:#fff;font-size:1.4rem;cursor:pointer;
}
.settings-btn{
  border:1px solid var(--line);background:var(--bg2);color:var(--muted);
  padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;
}
.settings-btn:hover{border-color:var(--accent-dim);color:var(--text)}
.settings-overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);
  display:none;align-items:flex-start;justify-content:center;padding:24px;overflow:auto;
}
.settings-overlay.open{display:flex}
.settings-panel{
  width:min(720px,100%);background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px 24px;
}
.settings-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.settings-head h2{font-size:1rem}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select{
  border:1px solid var(--line);border-radius:8px;background:var(--bg3);
  color:var(--text);padding:8px 10px;font-size:.85rem;
}
.field.full{grid-column:1/-1}
.settings-section{margin:18px 0 8px;font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}
.settings-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.settings-actions button{
  border:1px solid var(--line);background:var(--bg3);color:var(--text);
  padding:10px 16px;border-radius:8px;cursor:pointer;
}
.settings-actions button.primary{border-color:var(--accent-dim);background:#1a2332;color:var(--accent)}
.sync-box{
  margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:8px;
  font-size:.8rem;color:var(--muted);
}
.sync-ok{color:var(--audio)}
.sync-warn{color:var(--warn)}
@media(max-width:640px){.settings-grid{grid-template-columns:1fr}}
@media(max-width:960px){
  .layout{grid-template-columns:1fr}
  .chronicle{position:relative;top:0;height:auto;border-right:none;border-bottom:1px solid var(--line)}
}
</style>
</head>
<body>
<header class="app-header">
  <div class="brand">
    <h1>Folio</h1>
    <span>day witness</span>
  </div>
  <div class="day-nav">
    <button type="button" id="day-prev" title="Previous day">‹</button>
    <input type="date" id="day-input"/>
    <button type="button" id="day-next" title="Next day">›</button>
  </div>
  <div class="status" id="status"></div>
  <button type="button" class="settings-btn" id="open-settings">Settings</button>
</header>

<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-head">
      <h2>Configuration</h2>
      <button type="button" class="settings-btn" id="close-settings">Close</button>
    </div>
    <p class="chronicle-meta" id="cfg-meta">Synced with ESP via /api/node/config</p>
    <form id="settings-form">
      <div class="settings-section">Brain</div>
      <div class="settings-grid">
        <div class="field"><label>Locale</label><input name="locale" id="cfg-locale"/></div>
        <div class="field"><label>Speech threshold</label><input name="speechEnergyThreshold" id="cfg-speech" type="number" step="0.001"/></div>
        <div class="field"><label>LM URL</label><input name="lmUrl" id="cfg-lm-url" type="url"/></div>
        <div class="field"><label>LM model</label><input name="lmModel" id="cfg-lm-model"/></div>
        <div class="field"><label>Whisper model</label><input name="whisperModel" id="cfg-whisper-model"/></div>
        <div class="field"><label>Whisper device</label>
          <select name="whisperDevice" id="cfg-whisper-device">
            <option value="cuda">cuda (NVIDIA GPU)</option>
            <option value="auto">auto</option>
            <option value="cpu">cpu</option>
            <option value="mps">mps (Apple)</option>
          </select>
        </div>
        <div class="field"><label>Episode gap (min)</label><input name="gapMin" id="cfg-ep-gap" type="number"/></div>
      </div>
      <div class="settings-section">ESP node (synced)</div>
      <div class="settings-grid">
        <div class="field"><label>Frame interval (ms)</label><input name="captureIntervalMs" id="cfg-frame-int" type="number"/></div>
        <div class="field"><label>JPEG quality</label><input name="jpegQuality" id="cfg-jpeg" type="number"/></div>
        <div class="field"><label>Frame size</label>
          <select name="frameSize" id="cfg-frame-size">
            <option value="QVGA">QVGA</option><option value="VGA">VGA</option><option value="SVGA">SVGA</option>
          </select>
        </div>
        <div class="field"><label>WiFi retry (ms)</label><input name="wifiRetryMs" id="cfg-wifi" type="number"/></div>
        <div class="field"><label>Push backoff max (ms)</label><input name="pushBackoffMaxMs" id="cfg-backoff" type="number"/></div>
        <div class="field"><label>Status interval (ms)</label><input name="statusIntervalMs" id="cfg-status" type="number"/></div>
      </div>
      <div class="settings-actions">
        <button type="submit" class="primary">Save &amp; sync</button>
        <button type="button" id="reload-settings">Reload</button>
      </div>
    </form>
    <div class="sync-box" id="sync-status">Loading devices…</div>
  </div>
</div>

<div class="layout">
  <aside class="chronicle">
    <div class="chronicle-label">Chronicle</div>
    <p class="chronicle-meta" id="digest-meta">Updating automatically…</p>
    <div class="chronicle-body" id="digest"></div>
  </aside>

  <section class="feed">
    <div class="feed-toolbar">
      <div>
        <h2>Witness feed</h2>
        <p class="feed-stats" id="counts"></p>
      </div>
      <div class="filters" id="filters">
        <button class="filter active" data-f="all">All</button>
        <button class="filter" data-f="frames">Frames</button>
        <button class="filter" data-f="speech">Speech</button>
        <button class="filter" data-f="quiet">Quiet audio</button>
      </div>
    </div>
    <div class="timeline" id="timeline"></div>
    <button class="load-more" id="load-more" hidden>Load older captures</button>
  </section>
</div>

<div class="lightbox" id="lightbox">
  <button type="button" id="lightbox-close">×</button>
  <img id="lightbox-img" alt=""/>
</div>

<script>
const PAGE=30;
let day=new URLSearchParams(location.search).get('day')||new Date().toISOString().slice(0,10);
let allItems=[];
let filter='all';
let shown=PAGE;

const $=id=>document.getElementById(id);

function setDay(d){
  day=d;
  $('day-input').value=d;
  const u=new URL(location.href);
  u.searchParams.set('day',d);
  history.replaceState(null,'',u);
  shown=PAGE;
  load();
}

function shiftDay(n){
  const d=new Date(day+'T12:00:00');
  d.setDate(d.getDate()+n);
  setDay(d.toISOString().slice(0,10));
}

$('day-input').value=day;
$('day-prev').onclick=()=>shiftDay(-1);
$('day-next').onclick=()=>shiftDay(1);
$('day-input').onchange=e=>setDay(e.target.value);

document.querySelectorAll('.filter').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter=btn.dataset.f;
    shown=PAGE;
    renderTimeline();
  };
});

$('load-more').onclick=()=>{shown+=PAGE;renderTimeline();};

function filteredItems(){
  return allItems.filter(i=>{
    if(filter==='frames')return i.type==='frame';
    if(filter==='speech')return i.type==='audio'&&i.speech;
    if(filter==='quiet')return i.type==='audio'&&!i.speech;
    if(filter==='all')return i.type==='frame'||(i.type==='audio'&&i.speech);
    return true;
  });
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function localTime(iso){
  try{
    return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch{return iso.slice(11,19);}
}

function renderItem(i){
  const t=localTime(i.at);
  if(i.type==='frame'){
    const pending=!i.caption;
    const cap=i.caption
      ?`<p class="caption">${escapeHtml(i.caption)}</p>`
      :`<p class="caption pending">Waiting for vision model…</p>`;
    return `<article class="entry">
      <div class="entry-time">${t}</div>
      <div class="entry-card">
        <div class="entry-head">
          <span class="badge frame">Frame</span>
          ${pending?'<span class="badge pending">queued</span>':''}
          <span class="entry-reason">${escapeHtml(i.reason||'')}</span>
        </div>
        <div class="entry-body">
          <img class="frame-img" src="/api/frame/${i.frame_id}" alt="Frame ${i.frame_id}" loading="lazy" data-full="/api/frame/${i.frame_id}"/>
          ${cap}
        </div>
      </div>
    </article>`;
  }
  if(i.type==='audio'){
    let txt;
    if(i.text){
      txt=`<blockquote class="transcript">“${escapeHtml(i.text)}”</blockquote>`;
    }else if(!i.processed){
      txt=`<p class="transcript pending">In Whisper queue…</p>`;
    }else{
      txt=`<p class="transcript pending">No words detected in this second</p>`;
    }
    return `<article class="entry">
      <div class="entry-time">${t}</div>
      <div class="entry-card">
        <div class="entry-head">
          <span class="badge audio">${i.speech?'Speech':'Quiet'}</span>
        </div>
        <div class="entry-body">
          <audio controls preload="none" src="/api/audio/${i.chunk_id}"></audio>
          ${txt}
        </div>
      </div>
    </article>`;
  }
  return '';
}

function renderTimeline(){
  const items=filteredItems().slice().sort((a,b)=>b.at.localeCompare(a.at));
  const slice=items.slice(0,shown);
  const el=$('timeline');
  if(!slice.length){
    el.innerHTML='<div class="empty">No captures for this filter.<br>ESP pushes → brain stores → feed fills up.</div>';
    $('load-more').hidden=true;
    return;
  }
  el.innerHTML=slice.map(renderItem).join('');
  $('load-more').hidden=items.length<=shown;
  el.querySelectorAll('.frame-img').forEach(img=>{
    img.onclick=()=>{
      $('lightbox-img').src=img.dataset.full;
      $('lightbox').classList.add('open');
    };
  });
}

$('lightbox-close').onclick=()=>$('lightbox').classList.remove('open');
$('lightbox').onclick=e=>{if(e.target.id==='lightbox')$('lightbox').classList.remove('open');};

async function load(){
  const [tl,q,d]=await Promise.all([
    fetch('/api/timeline?day='+day).then(r=>r.json()),
    fetch('/api/queue').then(r=>r.json()),
    fetch('/api/digest?day='+day).then(r=>r.json()).catch(()=>({})),
  ]);
  allItems=tl.items||[];
  const frames=allItems.filter(i=>i.type==='frame').length;
  const speech=allItems.filter(i=>i.type==='audio'&&i.speech).length;
  const quiet=allItems.filter(i=>i.type==='audio'&&!i.speech).length;
  $('counts').textContent=`${frames} frames · ${speech} speech · ${quiet} quiet`;
  const pending=q.pending||{};
  const pa=pending.audio||0;
  const pf=pending.frames||0;
  $('status').innerHTML=
    (pa+pf>0?`<span class="pill warn">${pa} audio · ${pf} frames in queue</span>`:'')+
    `<span class="pill ok">brain :__PORT__</span>`;
  $('digest').textContent=d.prose||'';
  $('digest').className=d.prose?'chronicle-body':'chronicle-body chronicle-empty';
  if(!d.prose)$('digest').textContent='Collecting the day… the chronicle writes itself as witness data arrives.';
  $('digest-meta').textContent=d.updated_at
    ?`Updated ${localTime(d.updated_at)} · auto`
    :'Auto-updates when new data arrives';
  renderTimeline();
}

load();
setInterval(load,10000);

const settingsOverlay=$('settings-overlay');
$('open-settings').onclick=()=>{settingsOverlay.classList.add('open');loadSettings();};
$('close-settings').onclick=()=>settingsOverlay.classList.remove('open');
settingsOverlay.onclick=e=>{if(e.target===settingsOverlay)settingsOverlay.classList.remove('open');};
$('reload-settings').onclick=loadSettings;

async function loadSettings(){
  const [cfg,dev]=await Promise.all([
    fetch('/api/config').then(r=>r.json()),
    fetch('/api/devices').then(r=>r.json()),
  ]);
  $('cfg-locale').value=cfg.locale;
  $('cfg-speech').value=cfg.audio.speechEnergyThreshold;
  $('cfg-lm-url').value=cfg.lm.url;
  $('cfg-lm-model').value=cfg.lm.model||cfg.lm.modelFast||'';
  $('cfg-whisper-model').value=cfg.audio.whisperModel;
  $('cfg-whisper-device').value=cfg.audio.whisperDevice||'cuda';
  $('cfg-ep-gap').value=cfg.episodes.gapMin;
  $('cfg-frame-int').value=cfg.frames.captureIntervalMs;
  $('cfg-jpeg').value=cfg.frames.jpegQuality;
  $('cfg-frame-size').value=cfg.frames.size;
  $('cfg-wifi').value=cfg.node.wifiRetryMs;
  $('cfg-backoff').value=cfg.node.pushBackoffMaxMs;
  $('cfg-status').value=cfg.node.statusIntervalMs;
  $('cfg-meta').textContent=`v${cfg.version||'?'} · ${cfg.configPath||'defaults'}`;
  const lines=(dev.devices||[]).map(d=>{
    const ok=d.node_config_applied===dev.brain_config_version;
    return `<div class="${ok?'sync-ok':'sync-warn'}">${escapeHtml(d.id)}: applied <code>${escapeHtml(d.node_config_applied||'—')}</code> · brain <code>${escapeHtml(dev.brain_config_version)}</code></div>`;
  });
  $('sync-status').innerHTML=lines.length?lines.join(''):'No ESP seen yet — push audio/frame to register device.';
}

$('settings-form').onsubmit=async e=>{
  e.preventDefault();
  const body={
    locale:$('cfg-locale').value,
    lm:{url:$('cfg-lm-url').value,model:$('cfg-lm-model').value},
    audio:{speechEnergyThreshold:Number($('cfg-speech').value),whisperModel:$('cfg-whisper-model').value,whisperDevice:$('cfg-whisper-device').value},
    episodes:{gapMin:Number($('cfg-ep-gap').value)},
    frames:{
      captureIntervalMs:Number($('cfg-frame-int').value),
      jpegQuality:Number($('cfg-jpeg').value),
      size:$('cfg-frame-size').value,
    },
    node:{
      wifiRetryMs:Number($('cfg-wifi').value),
      pushBackoffMaxMs:Number($('cfg-backoff').value),
      statusIntervalMs:Number($('cfg-status').value),
    },
  };
  const res=await fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const json=await res.json();
  if(json.restartRecommended){
    $('cfg-meta').textContent='Saved — restart brain for LM/Whisper/port changes. ESP syncs on next poll.';
  }else{
    $('cfg-meta').textContent=`Saved v${json.version} — ESP picks up on next status interval.`;
  }
  loadSettings();
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Folio</title>
<style>
:root{
  --bg:#12141a;--panel:#1a1e28;--line:#2d3548;--text:#e8eaef;--muted:#8b95a8;
  --accent:#6b9fff;--ok:#4ade80;--warn:#fbbf24;--r:10px;
  --sans:system-ui,sans-serif;--serif:Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:15px/1.5 var(--sans);min-height:100vh}
button,input,select,textarea{font:inherit;color:inherit}
a{color:var(--accent)}
header{
  position:sticky;top:0;z-index:10;background:#12141ae6;backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:12px 16px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
}
h1{font:500 1.25rem var(--serif)}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{
  border:1px solid var(--line);background:var(--panel);padding:7px 14px;
  border-radius:var(--r);cursor:pointer;color:var(--muted);
}
.tab.on{border-color:var(--accent);color:var(--accent)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.pill{font-size:.75rem;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.pill.warn{color:var(--warn);border-color:#5c4818}
.pill.ok{color:var(--ok);border-color:#1a4d3a}
.day{display:flex;gap:4px;align-items:center}
.day button,.day input{
  border:1px solid var(--line);background:var(--panel);border-radius:var(--r);padding:6px 10px;
}
.day button{cursor:pointer;width:34px}
main{max-width:1100px;margin:0 auto;padding:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px}
.panel h2{font-size:.95rem;margin-bottom:12px}
.panel h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.muted{color:var(--muted);font-size:.85rem}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.row button,.row .btn{
  border:1px solid var(--line);background:var(--bg);padding:8px 14px;border-radius:var(--r);cursor:pointer;
}
.row button.primary{border-color:var(--accent);color:var(--accent)}
.row button:disabled{opacity:.5;cursor:not-allowed}
.prose{font-family:var(--serif);line-height:1.7;white-space:pre-wrap}
.empty{color:var(--muted);font-style:italic;padding:24px;text-align:center;border:1px dashed var(--line);border-radius:var(--r)}
.feed{display:flex;flex-direction:column;gap:12px}
.item{border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.item-head{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);font-size:.78rem;color:var(--muted)}
.tag{font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:6px;background:#243044;color:var(--accent)}
.tag.audio{background:#1a2e24;color:var(--ok)}
.item-body{padding:12px}
.item img{max-width:100%;border-radius:6px;background:#000;cursor:pointer}
.item blockquote{border-left:3px solid var(--accent);padding-left:12px;margin-top:8px;font-family:var(--serif)}
audio{width:100%;margin-top:8px}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:4px}
.field input,.field select,.field textarea{
  width:100%;border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:8px;
}
.field textarea{min-height:60px;resize:vertical}
.field .hint{font-size:.7rem;color:var(--muted);margin-top:2px}
.devices{font-size:.85rem}
.devices .ok{color:var(--ok)}.devices .bad{color:var(--warn)}
.mem-hit{padding:8px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.mem-hit:last-child{border:none}
#toast{
  position:fixed;bottom:16px;right:16px;background:var(--panel);border:1px solid var(--line);
  padding:10px 16px;border-radius:var(--r);display:none;max-width:360px;z-index:20;
}
.lightbox{position:fixed;inset:0;background:#000c;display:none;place-items:center;z-index:30;padding:16px}
.lightbox.open{display:grid}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px}
.lightbox button{position:absolute;top:12px;right:12px;border:none;background:#fff3;color:#fff;font-size:1.5rem;width:40px;height:40px;border-radius:50%;cursor:pointer}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Folio</h1>
  <nav class="tabs" id="tabs">
    <button type="button" class="tab on" data-tab="day">Dia</button>
    <button type="button" class="tab" data-tab="system">Sistema</button>
    <button type="button" class="tab" data-tab="config">Config</button>
  </nav>
  <div class="day">
    <button type="button" id="day-prev">‹</button>
    <input type="date" id="day-input"/>
    <button type="button" id="day-next">›</button>
  </div>
  <div class="pills" id="pills"></div>
</header>

<main id="view-day">
  <section class="panel">
    <h2>Crônica</h2>
    <p class="muted" id="digest-meta"></p>
    <div class="prose" id="digest"></div>
    <div class="row" style="margin-top:12px">
      <button type="button" class="primary" id="btn-digest">Gerar digest agora</button>
    </div>
  </section>
  <section class="panel">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2>Timeline</h2>
      <div class="row" style="margin:0">
        <button type="button" class="filter on" data-f="all">Tudo</button>
        <button type="button" class="filter" data-f="frames">Frames</button>
        <button type="button" class="filter" data-f="speech">Fala</button>
      </div>
    </div>
    <p class="muted" id="feed-stats"></p>
    <div class="feed" id="feed"></div>
  </section>
</main>

<main id="view-system" hidden>
  <section class="panel">
    <h2>Status</h2>
    <div class="grid2" id="health-grid"></div>
    <div class="row" style="margin-top:12px">
      <button type="button" id="btn-process">Processar fila (Whisper + visão)</button>
      <button type="button" id="btn-reindex">Reindexar memória</button>
    </div>
    <p class="muted" id="action-msg" style="margin-top:8px"></p>
  </section>
  <section class="panel">
    <h2>Dispositivos ESP</h2>
    <div class="devices" id="devices"></div>
  </section>
  <section class="panel">
    <h2>Memória (RAG)</h2>
    <p class="muted" id="mem-stats"></p>
    <div class="row">
      <input type="search" id="mem-q" placeholder="Buscar na memória…" style="flex:1;min-width:180px;border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:8px"/>
      <button type="button" id="mem-search">Buscar</button>
    </div>
    <div id="mem-hits" style="margin-top:12px"></div>
    <details style="margin-top:12px"><summary class="muted">Perfil (facts)</summary>
      <pre id="mem-profile" style="font-size:.78rem;margin-top:8px;overflow:auto"></pre>
    </details>
  </section>
</main>

<main id="view-config" hidden>
  <section class="panel">
    <p class="muted" id="cfg-info"></p>
    <p class="muted" id="cfg-runtime"></p>
    <form id="cfg-form"></form>
    <div class="row" style="margin-top:16px">
      <button type="submit" form="cfg-form" class="primary">Salvar</button>
      <button type="button" id="cfg-reload">Recarregar</button>
    </div>
    <p class="muted" id="cfg-save-msg" style="margin-top:8px"></p>
  </section>
</main>

<div id="toast"></div>
<div class="lightbox" id="lightbox"><button type="button" id="lb-close">×</button><img id="lb-img" alt=""/></div>

<script>
const $=id=>document.getElementById(id);
let day=new URLSearchParams(location.search).get("day")||new Date().toISOString().slice(0,10);
let filter="all";
let cfgCache=null;

/** Alinhado com folio.config.example.json */
const SECTIONS=[
  {title:"Geral",fields:[
    {path:"locale",label:"Idioma",type:"text"},
    {path:"port",label:"Porta HTTP",type:"number",hint:"Reinicia brain"},
    {path:"dataDir",label:"Pasta de dados",type:"text",hint:"Reinicia brain · vazio = ~/.folio"},
  ]},
  {title:"LM Studio",fields:[
    {path:"lm.url",label:"URL chat/completions",type:"text"},
    {path:"lm.model",label:"Modelo rápido",type:"text"},
    {path:"lm.modelDeep",label:"Modelo deep (digest)",type:"text",hint:"Vazio = igual ao rápido"},
  ]},
  {title:"Áudio (ESP + brain)",fields:[
    {path:"audio.chunkMs",label:"Chunk (ms)",type:"number",hint:"Reflash ESP se mudar"},
    {path:"audio.sampleRate",label:"Sample rate",type:"number",hint:"Reflash ESP se mudar"},
    {path:"audio.speechEnergyThreshold",label:"Limiar fala (RMS)",type:"number",step:"0.001"},
    {path:"audio.retentionDays",label:"Retenção PCM (dias)",type:"number"},
    {path:"audio.retentionSweepMs",label:"Varredura retenção (ms)",type:"number"},
    {path:"audio.pipelineBatch",label:"Batch Whisper",type:"number"},
  ]},
  {title:"Whisper",fields:[
    {path:"audio.whisperBin",label:"Binário",type:"text"},
    {path:"audio.whisperModel",label:"Modelo",type:"text"},
    {path:"audio.whisperDevice",label:"Device",type:"select",options:["cuda","auto","cpu","mps"]},
    {path:"audio.whisperTimeoutMs",label:"Timeout (ms)",type:"number"},
    {path:"audio.whisperLanguage",label:"Idioma",type:"text",hint:"Vazio = auto do locale"},
  ]},
  {title:"Câmera / visão",fields:[
    {path:"frames.captureIntervalMs",label:"Intervalo captura (ms)",type:"number"},
    {path:"frames.captionIntervalMs",label:"Intervalo caption LM (ms)",type:"number"},
    {path:"frames.captionMaxTokens",label:"Caption max tokens",type:"number"},
    {path:"frames.captionTemperature",label:"Caption temperature",type:"number",step:"0.01"},
    {path:"frames.pipelineBatch",label:"Batch frames",type:"number"},
    {path:"frames.jpegQuality",label:"JPEG quality",type:"number"},
    {path:"frames.size",label:"Resolução",type:"select",options:["CIF","QVGA","VGA","SVGA","XGA"],hint:"CIF/XGA = reflash"},
  ]},
  {title:"Pipeline",fields:[
    {path:"pipeline.enabled",label:"Ativo",type:"bool"},
    {path:"pipeline.intervalMs",label:"Intervalo worker (ms)",type:"number"},
  ]},
  {title:"Worker (backlog)",fields:[
    {path:"worker.backlogHigh",label:"Backlog alto",type:"number"},
    {path:"worker.backlogMedium",label:"Backlog médio",type:"number"},
    {path:"worker.batchMaxHigh",label:"Batch max (alto)",type:"number"},
    {path:"worker.batchMaxMedium",label:"Batch max (médio)",type:"number"},
  ]},
  {title:"Digest",fields:[
    {path:"digest.auto",label:"Auto",type:"bool"},
    {path:"digest.intervalMs",label:"Intervalo (ms)",type:"number"},
    {path:"digest.passDTemperature",label:"Pass D temperature",type:"number",step:"0.01"},
  ]},
  {title:"Episódios",fields:[
    {path:"episodes.gapMin",label:"Gap entre episódios (min)",type:"number"},
    {path:"episodes.frameAlignMs",label:"Alinhamento frame (ms)",type:"number"},
    {path:"episodes.graphEdge.themed",label:"Grafo: themed conf",type:"number",step:"0.01"},
    {path:"episodes.graphEdge.decided",label:"Grafo: decided conf",type:"number",step:"0.01"},
    {path:"episodes.graphEdge.open",label:"Grafo: open conf",type:"number",step:"0.01"},
    {path:"episodes.graphEdge.rejected",label:"Grafo: rejected conf",type:"number",step:"0.01"},
  ]},
  {title:"Memória RAG",fields:[
    {path:"memory.enabled",label:"Ativa",type:"bool"},
    {path:"memory.lookbackDays",label:"Lookback (dias)",type:"number"},
    {path:"memory.retrieveLimit",label:"Limite retrieve",type:"number"},
    {path:"memory.minScore",label:"Score mínimo",type:"number",step:"0.01"},
    {path:"memory.useEmbeddings",label:"Embeddings LM",type:"bool"},
    {path:"memory.embeddingModel",label:"Modelo embed",type:"text"},
    {path:"memory.embeddingsUrl",label:"URL embeddings",type:"text"},
    {path:"memory.fallbackLexical",label:"Fallback lexical",type:"bool"},
    {path:"memory.graphRetrieveLimit",label:"Grafo limit",type:"number"},
    {path:"memory.graphMinScore",label:"Grafo min score",type:"number",step:"0.01"},
    {path:"memory.profileLimit",label:"Profile limit",type:"number"},
    {path:"memory.minFactTextLength",label:"Min fact length",type:"number"},
  ]},
  {title:"ESP (node)",fields:[
    {path:"node.wifiRetryMs",label:"WiFi retry (ms)",type:"number"},
    {path:"node.pushBackoffMaxMs",label:"Push backoff max (ms)",type:"number"},
    {path:"node.statusIntervalMs",label:"Status interval (ms)",type:"number"},
  ]},
];

function get(obj,path){
  return path.split(".").reduce((o,k)=>o?.[k],obj);
}
function set(obj,path,val){
  const keys=path.split(".");
  let o=obj;
  for(let i=0;i<keys.length-1;i++){
    if(!o[keys[i]]||typeof o[keys[i]]!=="object")o[keys[i]]={};
    o=o[keys[i]];
  }
  o[keys[keys.length-1]]=val;
}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(msg){const t=$("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",4000);}
function time(iso){try{return new Date(iso).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}catch{return iso?.slice(11,19)||"";}}

function setDay(d){
  day=d;$("day-input").value=d;
  const u=new URL(location.href);u.searchParams.set("day",d);history.replaceState(null,"",u);
  loadDay();
}
function shiftDay(n){const d=new Date(day+"T12:00:00");d.setDate(d.getDate()+n);setDay(d.toISOString().slice(0,10));}

$("day-input").value=day;
$("day-prev").onclick=()=>shiftDay(-1);
$("day-next").onclick=()=>shiftDay(1);
$("day-input").onchange=e=>setDay(e.target.value);

document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    $("view-day").hidden=btn.dataset.tab!=="day";
    $("view-system").hidden=btn.dataset.tab!=="system";
    $("view-config").hidden=btn.dataset.tab!=="config";
    if(btn.dataset.tab==="system")loadSystem();
    if(btn.dataset.tab==="config")loadConfigForm();
  };
});

document.querySelectorAll(".filter").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    filter=btn.dataset.f;
    loadDay();
  };
});

function renderFeed(items){
  const list=items.filter(i=>{
    if(filter==="frames")return i.type==="frame";
    if(filter==="speech")return i.type==="audio"&&i.speech;
    return i.type==="frame"||(i.type==="audio"&&i.speech);
  }).sort((a,b)=>b.at.localeCompare(a.at));

  if(!list.length){$("feed").innerHTML='<div class="empty">Nada neste filtro para este dia.</div>';return;}

  $("feed").innerHTML=list.map(i=>{
    if(i.type==="frame"){
      return `<article class="item"><div class="item-head"><span class="tag">Frame</span><span>${time(i.at)}</span><span>${esc(i.reason||"")}</span>${i.processed?"":'<span class="tag">fila</span>'}</div>
        <div class="item-body"><img src="/api/frame/${i.frame_id}" alt="" loading="lazy" data-id="${i.frame_id}"/>
        <p class="muted">${i.caption?esc(i.caption):"Aguardando caption…"}</p></div></article>`;
    }
    const txt=i.text?`<blockquote>${esc(i.text)}</blockquote>`:(i.processed?"<p class=\"muted\">Sem fala detectada</p>":"<p class=\"muted\">Na fila Whisper…</p>");
    const aud=i.has_pcm?`<audio controls preload="none" src="/api/audio/${i.chunk_id}"></audio>`:"<p class=\"muted\">PCM expirado</p>";
    return `<article class="item"><div class="item-head"><span class="tag audio">Áudio</span><span>${time(i.at)}</span><span>energy ${(i.energy??0).toFixed(4)}</span></div>
      <div class="item-body">${aud}${txt}</div></article>`;
  }).join("");

  $("feed").querySelectorAll("img").forEach(img=>{
    img.onclick=()=>{$("lb-img").src=img.src;$("lightbox").classList.add("open");};
  });
}

async function loadPills(){
  const [q,h]=await Promise.all([fetch("/api/queue").then(r=>r.json()),fetch("/api/health").then(r=>r.json())]);
  const pa=q.pending?.audio||0,pf=q.pending?.frames||0;
  $("pills").innerHTML=
    (pa+pf?`<span class="pill warn">${pa} áudio · ${pf} frames</span>`:"")+
    `<span class="pill ok">${h.memory_chunks??0} mem</span>`+
    `<span class="pill">:${location.port||"__PORT__"}</span>`;
}

async function loadDay(){
  const [tl,d]=await Promise.all([
    fetch("/api/timeline?day="+day).then(r=>r.json()),
    fetch("/api/digest?day="+day).then(r=>r.json()).catch(()=>({})),
  ]);
  const items=tl.items||[];
  const fr=items.filter(i=>i.type==="frame").length;
  const sp=items.filter(i=>i.type==="audio"&&i.speech).length;
  $("feed-stats").textContent=`${fr} frames · ${sp} chunks de fala`;
  $("digest").textContent=d.prose||"Sem crônica ainda — dados chegam do ESP e o digest roda automaticamente.";
  $("digest-meta").textContent=d.updated_at?`Atualizado ${time(d.updated_at)}`:"";
  renderFeed(items);
  loadPills();
}

$("btn-digest").onclick=async()=>{
  $("btn-digest").disabled=true;
  try{
    const r=await fetch("/api/digest/run?day="+day,{method:"POST"}).then(x=>x.json());
    toast(r.skipped?"Digest já atualizado":"Digest gerado");
    loadDay();
  }catch(e){toast("Erro: "+e.message);}
  $("btn-digest").disabled=false;
};

async function loadSystem(){
  const [h,dev,mem]=await Promise.all([
    fetch("/api/health").then(r=>r.json()),
    fetch("/api/devices").then(r=>r.json()),
    fetch("/api/memory?day="+day).then(r=>r.json()),
  ]);
  $("health-grid").innerHTML=[
    ["Dados",h.data_dir],["Pipeline",h.pipeline?"ativo":"pausado"],
    ["Fila áudio",h.pending?.audio??0],["Fila frames",h.pending?.frames??0],
    ["Memória chunks",h.memory_chunks??0],["Porta",h.port],
  ].map(([k,v])=>`<div class="field"><label>${k}</label><div>${esc(v)}</div></div>`).join("");

  const lines=(dev.devices||[]).map(d=>{
    const ok=d.node_config_applied===dev.brain_config_version;
    return `<div class="${ok?"ok":"bad"}"><strong>${esc(d.id)}</strong> · visto ${d.last_seen_at?time(d.last_seen_at):"—"} · config ${esc(d.node_config_applied||"—")} ${ok?"✓":"≠ brain"}</div>`;
  });
  $("devices").innerHTML=lines.length?lines.join(""):"<p class=\"muted\">Nenhum ESP registrado — envie áudio/frame.</p>";

  $("mem-stats").textContent=`${mem.chunks??0} chunks indexados`;
  $("mem-profile").textContent=JSON.stringify(mem.profile||[],null,2);
  if(mem.hits?.length){
    $("mem-hits").innerHTML=mem.hits.map(h=>`<div class="mem-hit"><strong>${esc(h.day)}</strong> ${esc(h.kind)} score ${h.score?.toFixed?.(2)}<br>${esc(h.text)}</div>`).join("");
  }
}

$("btn-process").onclick=async()=>{
  $("btn-process").disabled=true;
  $("action-msg").textContent="Processando…";
  try{
    const r=await fetch("/api/process",{method:"POST"}).then(x=>x.json());
    const utt=(r.audio||[]).filter(x=>x.text).length;
    const cap=(r.frames||[]).filter(x=>x.caption).length;
    $("action-msg").textContent=`Pronto: ${utt} transcrições, ${cap} captions · fila ${r.pending?.audio??0}/${r.pending?.frames??0}`;
    loadPills();loadDay();
  }catch(e){$("action-msg").textContent="Erro: "+e.message;}
  $("btn-process").disabled=false;
};

$("btn-reindex").onclick=async()=>{
  $("btn-reindex").disabled=true;
  try{
    const r=await fetch("/api/memory/reindex",{method:"POST"}).then(x=>x.json());
    toast(`Memória: ${r.before} → ${r.after} chunks (${r.days} dias)`);
    loadSystem();
  }catch(e){toast("Erro: "+e.message);}
  $("btn-reindex").disabled=false;
};

$("mem-search").onclick=async()=>{
  const q=$("mem-q").value;
  const r=await fetch("/api/memory?day="+day+"&q="+encodeURIComponent(q)).then(x=>x.json());
  $("mem-hits").innerHTML=(r.hits||[]).length
    ?r.hits.map(h=>`<div class="mem-hit"><strong>${esc(h.day)}</strong> ${esc(h.kind)} score ${h.score?.toFixed?.(2)}<br>${esc(h.text)}</div>`).join("")
    :"<p class=\"muted\">Nenhum hit.</p>";
};
$("mem-q").onkeydown=e=>{if(e.key==="Enter")$("mem-search").click();};

function buildConfigForm(){
  const form=$("cfg-form");
  form.innerHTML=SECTIONS.map(sec=>`<h3>${sec.title}</h3><div class="grid2">${sec.fields.map(f=>{
    const id="f-"+f.path.replace(/\./g,"-");
    if(f.type==="bool"){
      return `<div class="field"><label for="${id}">${f.label}</label>
        <select id="${id}" data-path="${f.path}"><option value="true">sim</option><option value="false">não</option></select>
        ${f.hint?`<div class="hint">${f.hint}</div>`:""}</div>`;
    }
    if(f.type==="select"){
      return `<div class="field"><label for="${id}">${f.label}</label>
        <select id="${id}" data-path="${f.path}">${f.options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select>
        ${f.hint?`<div class="hint">${f.hint}</div>`:""}</div>`;
    }
    return `<div class="field"><label for="${id}">${f.label}</label>
      <input id="${id}" data-path="${f.path}" type="${f.type||"text"}" ${f.step?`step="${f.step}"`:""}/>
      ${f.hint?`<div class="hint">${f.hint}</div>`:""}</div>`;
  }).join("")}</div>`).join("");
}

function loadConfigForm(){
  fetch("/api/config").then(r=>r.json()).then(cfg=>{
    cfgCache=cfg;
    $("cfg-info").textContent=`${cfg.configPath||"defaults"} · hash ${cfg.version||"?"}`;
    const rt=cfg.runtime||{},m=rt.models||{};
    $("cfg-runtime").textContent=`Whisper: ${rt.whisperDeviceEffective} · CUDA: ${rt.cudaAvailable?"sim":"não"} · modelos: ${m.fast} / ${m.deep} / ${m.whisper}`;
    document.querySelectorAll("[data-path]").forEach(el=>{
      const v=get(cfg,el.dataset.path);
      if(el.tagName==="SELECT"&&el.querySelector('option[value="true"]')){
        el.value=v===false||v==="false"?"false":"true";
      }else{
        el.value=v==null?"":v;
      }
    });
  });
}

buildConfigForm();

$("cfg-form").onsubmit=async e=>{
  e.preventDefault();
  const patch=JSON.parse(JSON.stringify(cfgCache));
  document.querySelectorAll("[data-path]").forEach(el=>{
    let v=el.value;
    if(el.tagName==="SELECT"&&el.querySelector('option[value="true"]')){
      v=v==="true";
    }else if(el.type==="number"){
      v=v===""?null:Number(v);
    }else if(v===""){
      v=null;
    }
    set(patch,el.dataset.path,v);
  });
  delete patch.configPath;delete patch.version;delete patch.runtime;
  const r=await fetch("/api/config",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(patch)}).then(x=>x.json());
  $("cfg-save-msg").textContent=r.restartRecommended?"Salvo — reinicie brain (porta/dataDir).":"Salvo — ESP sincroniza no próximo poll.";
  cfgCache=r.config||patch;
  toast("Config salva");
};

$("cfg-reload").onclick=loadConfigForm;

$("lb-close").onclick=()=>$("lightbox").classList.remove("open");
$("lightbox").onclick=e=>{if(e.target.id==="lightbox")$("lightbox").classList.remove("open");};

loadDay();
setInterval(()=>{loadPills();if(!$("view-day").hidden)loadDay();},12000);
</script>
</body>
</html>

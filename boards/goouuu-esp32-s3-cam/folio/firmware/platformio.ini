[platformio]
default_envs = goouuu-s3-cam
extra_configs = platformio.local.ini

[env:goouuu-s3-cam]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DFOLIO_MICROSD_SPOOL=1
    -I include
    ; WiFi: auto-connects to strongest open AP; optional WIFI_SSID/WIFI_PASS fallback (platformio.local.ini)
    ; -DWIFI_SSID=\"minha-rede\"
    ; -DWIFI_PASS=\"minha-senha\"
    -DFOLIO_BRAIN_URL=\"http://192.168.1.28:8770\"
    -DFOLIO_DEVICE_ID=\"folio-s3-01\"
    ; Frames / audio (optional — see folio_config.h & folio.config.example.json)
    ; -DFOLIO_FRAME_INTERVAL_MS=60000
    ; -DFOLIO_JPEG_QUALITY=12
    ; -DFOLIO_FRAME_SIZE_ID=6
    ; -DFOLIO_CHUNK_MS=1000
    ; -DFOLIO_SAMPLE_RATE=16000
    ; Keyestudio DOUT GPIO42 (invalid on GOOUUU): -DPIN_I2S_DOUT=42
    ; Disable microSD spool (not recommended): -DFOLIO_MICROSD_SPOOL=0
build_unflags =
    -DARDUINO_USB_MODE=1
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    espressif/esp32-camera @ ^2.0.4

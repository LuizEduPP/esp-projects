[platformio]
default_envs = cyd

[env:cyd]
platform = espressif32 @ ^6.9.0
board = esp32-2432S028R
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = partitions.csv
monitor_rts = 0
monitor_dtr = 0

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=1
    -I include
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER
    -DTFT_INVERSION_ON
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
    -DUSE_HSPI_PORT
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DTOUCH_CS=33
    -DTOUCH_IRQ=36
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DTOUCH_CLK=25

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/TheNitek/XPT2046_Bitbang_Arduino_Library.git
